services:
  - type: web
    name: fraudgraph-api
    env: python
    buildCommand: |
      pip install -r requirements.txt
      pip install torch-scatter torch-sparse \
        -f https://data.pyg.org/whl/torch-2.2.2+cpu.html
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OLLAMA_URL
        value: disabled
      - key: OLLAMA_MODEL
        value: llama3.2:1b
      - key: PYTHON_VERSION
        value: 3.11.0
